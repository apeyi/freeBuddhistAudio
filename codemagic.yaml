workflows:
  ios-build:
    name: iOS Build & Test
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: cd FBAudio-iOS && xcodegen generate

      - name: Build
        script: |
          set -o pipefail
          cd FBAudio-iOS
          xcodebuild build \
            -project FBAudio.xcodeproj \
            -scheme FBAudio \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee ../build.log

      - name: Export simulator app
        script: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "FBAudio.app" -path "*/Debug-iphonesimulator/*" | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r ~/FBAudio-simulator.zip FBAudio.app
          fi

      - name: Test
        script: |
          set -o pipefail
          cd FBAudio-iOS
          SIM_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d.get('name', '') and d.get('isAvailable'):
                          print(d['udid']); sys.exit(0)
          ")
          xcodebuild test \
            -project FBAudio.xcodeproj \
            -scheme FBAudio \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee ../test.log

    artifacts:
      - build.log
      - test.log
      - ~/FBAudio-simulator.zip

  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        # Set up once in the Codemagic UI (Settings → Environment variables),
        # group name "appstore", all marked Secure:
        #   APP_STORE_CONNECT_ISSUER_ID   = 4606a2fd-8b6a-4691-98a5-fe3770977a91
        #   APP_STORE_CONNECT_KEY_IDENTIFIER = D7W67V45YF
        #   APP_STORE_CONNECT_PRIVATE_KEY = <contents of AuthKey_D7W67V45YF.p8>
        #   CERTIFICATE_PRIVATE_KEY       = <contents of fba_distribution.key>
        # (These conventional names are auto-read by the codemagic CLI tools.)
        - appstore
      vars:
        BUNDLE_ID: "com.fba.app"
    # Manual trigger only — TestFlight builds are deliberate, not every push.
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: cd FBAudio-iOS && xcodegen generate

      - name: Build, sign & export IPA (automatic signing via API key)
        script: |
          set -e
          # 1. Put the distribution cert + our private key into the keychain so
          #    Xcode has a valid "Apple Distribution" identity to reuse.
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create || true
          keychain add-certificates

          # 2. Expose the App Store Connect API key to xcodebuild so
          #    -allowProvisioningUpdates can create/download the profile itself.
          KEYDIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYDIR"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" \
            > "$KEYDIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          AUTH="-allowProvisioningUpdates \
            -authenticationKeyPath $KEYDIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8 \
            -authenticationKeyID ${APP_STORE_CONNECT_KEY_IDENTIFIER} \
            -authenticationKeyIssuerID ${APP_STORE_CONNECT_ISSUER_ID}"

          cd FBAudio-iOS

          # 3. Unique, increasing build number from the latest TestFlight build.
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $(( ${LATEST:-0} + 1 )) || true

          set -o pipefail
          # 4. Archive — automatic signing; Xcode reuses the keychain identity and
          #    provisions via the API key.
          xcodebuild -project FBAudio.xcodeproj -scheme FBAudio \
            -destination 'generic/platform=iOS' \
            -archivePath build/FBAudio.xcarchive \
            $AUTH \
            CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=QF9T4N59B4 \
            clean archive 2>&1 | tee ../testflight-build.log

          # Diagnostic: what signing actually got applied.
          grep -iE "CODE_SIGN|PROVISIONING|DEVELOPMENT_TEAM|Signing Identity" ../testflight-build.log | head -20 || true

          # 5. Export the IPA.
          printf '%s' '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>app-store-connect</string><key>teamID</key><string>QF9T4N59B4</string><key>signingStyle</key><string>automatic</string></dict></plist>' > exportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/FBAudio.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist exportOptions.plist \
            $AUTH 2>&1 | tee -a ../testflight-build.log

    artifacts:
      - FBAudio-iOS/build/ipa/*.ipa
      - testflight-build.log
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # To auto-distribute to an external group, create the group once in
        # App Store Connect and uncomment (the first external build triggers a
        # one-time Beta App Review):
        # beta_groups:
        #   - "External Testers"
