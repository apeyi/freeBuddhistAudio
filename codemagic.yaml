workflows:
  ios-build:
    name: iOS Build & Test
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: cd FBAudio-iOS && xcodegen generate

      - name: Build
        script: |
          set -o pipefail
          cd FBAudio-iOS
          xcodebuild build \
            -project FBAudio.xcodeproj \
            -scheme FBAudio \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee ../build.log

      - name: Export simulator app
        script: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "FBAudio.app" -path "*/Debug-iphonesimulator/*" | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r ~/FBAudio-simulator.zip FBAudio.app
          fi

      - name: Test
        script: |
          set -o pipefail
          cd FBAudio-iOS
          SIM_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d.get('name', '') and d.get('isAvailable'):
                          print(d['udid']); sys.exit(0)
          ")
          xcodebuild test \
            -project FBAudio.xcodeproj \
            -scheme FBAudio \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee ../test.log

    artifacts:
      - build.log
      - test.log
      - ~/FBAudio-simulator.zip

  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        # Set up once in the Codemagic UI (Settings → Environment variables),
        # group name "appstore", all marked Secure. The two keys are stored
        # BASE64-ENCODED (single line) — pasting raw multi-line PEM into the UI
        # mangles the newlines and breaks them ("not a valid PEM private key").
        #   ASC_ISSUER_ID = 4606a2fd-8b6a-4691-98a5-fe3770977a91
        #   ASC_KEY_ID    = D7W67V45YF
        #   ASC_KEY_B64   = base64 of AuthKey_D7W67V45YF.p8   (App Store Connect API key)
        #   CERT_KEY_B64  = base64 of fba_distribution.key    (distribution signing key)
        - appstore
      vars:
        BUNDLE_ID: "com.dharmachakra.fba"
    # Manual trigger only — TestFlight builds are deliberate, not every push.
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: cd FBAudio-iOS && xcodegen generate

      - name: Build, sign, export & upload to TestFlight
        script: |
          set -e
          # 0. Decode the base64 secrets to files (base64 avoids the multi-line
          #    PEM mangling that broke earlier builds).
          echo "$ASC_KEY_B64"  | base64 --decode > /tmp/asc_key.p8
          echo "$CERT_KEY_B64" | base64 --decode > /tmp/cert_key.pem
          KEYDIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYDIR"
          cp /tmp/asc_key.p8 "$KEYDIR/AuthKey_${ASC_KEY_ID}.p8"   # altool/xcodebuild look here

          # 1. Put the distribution cert + our private key into the keychain so
          #    Xcode has a valid "Apple Distribution" identity to reuse.
          keychain initialize
          # The bundle ID is registered as UNIVERSAL (Apple's modern default);
          # the CLI's default platform=IOS filter misses it and --create then
          # collides with the existing App ID (409). Match UNIVERSAL instead.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform UNIVERSAL \
            --type IOS_APP_STORE \
            --issuer-id "$ASC_ISSUER_ID" --key-id "$ASC_KEY_ID" --private-key @file:/tmp/asc_key.p8 \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain add-certificates

          AUTH="-allowProvisioningUpdates \
            -authenticationKeyPath $KEYDIR/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID ${ASC_KEY_ID} \
            -authenticationKeyIssuerID ${ASC_ISSUER_ID}"

          cd FBAudio-iOS

          # 2. Unique, increasing build number from the latest TestFlight build.
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" \
            --issuer-id "$ASC_ISSUER_ID" --key-id "$ASC_KEY_ID" --private-key @file:/tmp/asc_key.p8 2>/dev/null || echo 0)
          agvtool new-version -all $(( ${LATEST:-0} + 1 )) || true

          set -o pipefail
          # 3. Archive (automatic signing; Xcode reuses the keychain identity,
          #    provisions via the API key).
          xcodebuild -project FBAudio.xcodeproj -scheme FBAudio \
            -destination 'generic/platform=iOS' \
            -archivePath build/FBAudio.xcarchive \
            $AUTH \
            CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=QF9T4N59B4 \
            clean archive 2>&1 | tee ../testflight-build.log

          # 4. Export the IPA.
          printf '%s' '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>app-store-connect</string><key>teamID</key><string>QF9T4N59B4</string><key>signingStyle</key><string>automatic</string></dict></plist>' > exportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/FBAudio.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist exportOptions.plist \
            $AUTH 2>&1 | tee -a ../testflight-build.log

          # 5. Upload to TestFlight (altool reads the API key from $KEYDIR).
          IPA=$(ls build/ipa/*.ipa | head -1)
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee -a ../testflight-build.log

    artifacts:
      - FBAudio-iOS/build/ipa/*.ipa
      - testflight-build.log
