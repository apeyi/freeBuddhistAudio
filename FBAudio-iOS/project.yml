name: FBAudio
options:
  bundleIdPrefix: com.fba
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"

targets:
  FBAudio:
    type: application
    platform: iOS
    sources:
      - FBAudio
      - path: ../fbaudio-shared
        name: SharedData
        type: folder
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dharmachakra.fba
      MARKETING_VERSION: "0.6.5"
      CURRENT_PROJECT_VERSION: 1
      # Required for `agvtool new-version` to set the build number in CI.
      VERSIONING_SYSTEM: "apple-generic"
      # Automatic signing in CI via -allowProvisioningUpdates + the App Store
      # Connect API key; team fixed to Dharmachakra Inc.
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: QF9T4N59B4
      INFOPLIST_FILE: FBAudio/Resources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_VERSION: "5.9"
    dependencies:
      - package: SwiftSoup
    info:
      path: FBAudio/Resources/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        # App only uses standard HTTPS — exempt from export-compliance, so
        # TestFlight won't prompt on every upload.
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.dharmachakra.fba.deeplink
            CFBundleURLSchemes:
              - fbaudio

  FBAudioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FBAudioTests
    dependencies:
      - target: FBAudio
    settings:
      SWIFT_VERSION: "5.9"
