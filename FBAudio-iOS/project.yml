name: FBAudio
options:
  bundleIdPrefix: com.fba
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"

targets:
  FBAudio:
    type: application
    platform: iOS
    sources:
      - FBAudio
      - path: ../fbaudio-shared
        name: SharedData
        type: folder
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.fba.app
      MARKETING_VERSION: "0.1.0"
      CURRENT_PROJECT_VERSION: 1
      INFOPLIST_FILE: FBAudio/Resources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_VERSION: "5.9"
    dependencies:
      - package: SwiftSoup
    info:
      path: FBAudio/Resources/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: com.fba.app.deeplink
            CFBundleURLSchemes:
              - fbaudio

  FBAudioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FBAudioTests
    dependencies:
      - target: FBAudio
    settings:
      SWIFT_VERSION: "5.9"
